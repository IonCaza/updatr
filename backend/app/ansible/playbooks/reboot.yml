---
- name: Reboot Linux hosts
  hosts: linux
  become: true
  gather_facts: false
  tasks:
    - name: Reboot Linux host
      ansible.builtin.reboot:
        reboot_timeout: 300
        msg: "Reboot initiated by Updatr"

    - name: Wait for host to come back
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 10

- name: Reboot Windows hosts
  hosts: windows
  gather_facts: false
  tasks:
    - name: Reboot Windows host
      ansible.windows.win_reboot:
        reboot_timeout: 600
        msg: "Reboot initiated by Updatr"
