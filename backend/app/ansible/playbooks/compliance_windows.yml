---
- name: Check Windows hosts for pending updates
  hosts: windows
  gather_facts: false
  tasks:
    - name: Search for available updates
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups
          - DefinitionUpdates
          - Updates
        state: searched
      register: update_result

    - name: Build compliance result
      ansible.builtin.set_fact:
        compliance_result:
          pending_updates: "{{ update_result.updates | default({}) | dict2items | map(attribute='value') | list }}"
          reboot_required: "{{ update_result.reboot_required | default(false) }}"
          update_count: "{{ update_result.found_update_count | default(0) }}"
